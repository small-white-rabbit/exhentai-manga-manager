        waterfallObserver.disconnect()
        waterfallObserver = null
      }
      currentBook = null
      currentPages = []
      preloadedImages.clear()
    }

    function renderReader() {
      if (readerMode === 'waterfall') {
        $('reader-image').classList.add('hidden')
        $('reader-bottom-bar').classList.add('hidden')
        $('waterfall-view').classList.remove('hidden')
        renderWaterfall()
      } else {
        $('waterfall-view').classList.add('hidden')
        $('reader-image').classList.remove('hidden')
        $('reader-bottom-bar').classList.remove('hidden')
        updatePage()
      }
    }

    function renderWaterfall() {
      const container = $('waterfall-view')
      container.innerHTML = ''
      $('reader-top-bar').classList.remove('scrolled-down')

      let lastScrollTop = 0
      container.onscroll = () => {
        const st = container.scrollTop
        if (st > lastScrollTop && st > 60) {
          $('reader-top-bar').classList.add('scrolled-down')
        } else {
          $('reader-top-bar').classList.remove('scrolled-down')
        }
        lastScrollTop = st <= 0 ? 0 : st

        const imgs = container.querySelectorAll('img')
        let currentImgIdx = 0
        for (let i = 0; i < imgs.length; i++) {
          const img = imgs[i]
          const rect = img.getBoundingClientRect()
          if (rect.top < window.innerHeight * 0.7) {
            currentImgIdx = i + 1
          }
        }
        if (currentBook && currentImgIdx > 0) {
          scheduleSaveReadingPosition('manga', currentBook.id, {
            page: currentImgIdx,
            scrollTop: st
          })
        }
      }

      waterfallObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const img = entry.target
          if (entry.isIntersecting) {
            const src = img.dataset.src
            if (src && img.src !== src) img.src = src
          }
        })
      }, { root: container, rootMargin: '1000px' })

      currentPages.forEach((url, index) => {
        const img = document.createElement('img')
        img.dataset.src = url
        img.alt = `page ${index + 1}`
        img.loading = 'lazy'
        waterfallObserver.observe(img)
        container.appendChild(img)
      })

      container.scrollTop = 0
    }

    function updatePage() {
      if (!currentBook || currentPages.length === 0) return
      const pageUrl = currentPages[currentPage - 1]
      $('page-img').src = pageUrl
      $('page-slider').value = currentPage
      $('page-input').value = currentPage
      preloadNeighbors()
      scheduleSaveReadingPosition('manga', currentBook.id, { page: currentPage, scrollTop: 0 })
    }

    function preloadNeighbors() {
      const urls = []
      if (currentPage > 1) urls.push(currentPages[currentPage - 2])
      if (currentPage < currentPages.length) urls.push(currentPages[currentPage])

      for (const url of urls) {
        if (!preloadedImages.has(url)) {
          const img = new Image()
          img.src = url
          preloadedImages.set(url, img)
        }
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--
        updatePage()
      }
    }

    function nextPage() {
      if (currentPage < currentPages.length) {
        currentPage++
        updatePage()
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    function extractBookTitle(title) {
      if (!title) return ''
      const str = String(title).trim()
      const m1 = str.match(/《([^》]+)》/)
      if (m1) return m1[1].trim()
      const m2 = str.match(/<([^>]+)>/)
      if (m2) return m2[1].trim()
      const m3 = str.match(/【([^】]+)】/)
      if (m3) return m3[1].trim()
      return str
    }

    function formatSize(bytes) {
      if (!bytes || isNaN(bytes)) return '?'
      const units = ['B', 'KB', 'MB', 'GB']
      let i = 0
      let size = Number(bytes)
      while (size >= 1024 && i < units.length - 1) {
        size /= 1024
        i++
      }
      return size.toFixed(1) + ' ' + units[i]
    }

    $('btn-manga').addEventListener('click', () => switchType('manga'))
    $('btn-novel').addEventListener('click', () => switchType('novel'))
    $('search-btn').addEventListener('click', () => currentType === 'manga' ? loadLibrary() : loadNovelLibrary())
    $('refresh-btn').addEventListener('click', () => currentType === 'manga' ? loadLibrary() : loadNovelLibrary())
    $('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        currentType === 'manga' ? loadLibrary() : loadNovelLibrary()
      }
    })

    $('back-btn').addEventListener('click', closeReader)
    $('prev-btn').addEventListener('click', prevPage)
    $('next-btn').addEventListener('click', nextPage)
    $('tap-prev').addEventListener('click', prevPage)
    $('tap-next').addEventListener('click', nextPage)

    $('reader-mode').addEventListener('change', e => {
      readerMode = e.target.value
      renderReader()
    })

    $('page-slider').addEventListener('input', e => {
      currentPage = parseInt(e.target.value, 10)
      updatePage()
    })

    $('page-input').addEventListener('change', e => {
      let p = parseInt(e.target.value, 10)
      if (isNaN(p)) p = 1
      p = Math.max(1, Math.min(currentPages.length, p))
      currentPage = p
      updatePage()
    })

    $('novel-back-btn').addEventListener('click', closeNovelReader)
    $('novel-chapter-btn').addEventListener('click', () => {
      $('novel-chapter-list').classList.toggle('open')
      $('novel-chapter-overlay').classList.toggle('open')
    })
    $('novel-chapter-overlay').addEventListener('click', () => {
      $('novel-chapter-list').classList.remove('open')
      $('novel-chapter-overlay').classList.remove('open')
    })

    $('novel-settings-btn').addEventListener('click', () => {
      $('novel-settings-panel').classList.add('open')
      $('novel-settings-overlay').classList.add('open')
    })
    $('novel-settings-close').addEventListener('click', () => {
      $('novel-settings-panel').classList.remove('open')
      $('novel-settings-overlay').classList.remove('open')
    })
    $('novel-settings-overlay').addEventListener('click', () => {
      $('novel-settings-panel').classList.remove('open')
      $('novel-settings-overlay').classList.remove('open')
    })

    document.querySelectorAll('#bg-color-swatches .color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        novelSettings.bgColor = swatch.dataset.bg
        novelSettings.fgColor = swatch.dataset.fg
        applyNovelSettings()
        saveNovelSettings()
        document.querySelectorAll('#bg-color-swatches .color-swatch').forEach(s => s.classList.remove('active'))
        swatch.classList.add('active')
      })
    })

    document.querySelectorAll('#font-samples .font-sample').forEach(sample => {
      sample.addEventListener('click', () => {
        novelSettings.fontFamily = sample.dataset.font
        applyNovelSettings()
        saveNovelSettings()
        document.querySelectorAll('#font-samples .font-sample').forEach(s => s.classList.remove('active'))
        sample.classList.add('active')
      })
    })

    document.querySelectorAll('.slider-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action
        const slider = btn.parentElement.querySelector('input[type="range"]')
        if (!slider) return

        let val = parseFloat(slider.value)
        const step = parseFloat(slider.step) || 1
        const min = parseFloat(slider.min)
        const max = parseFloat(slider.max)

        if (action.includes('inc')) {
          val = Math.min(max, val + step)
        } else if (action.includes('dec')) {
          val = Math.max(min, val - step)
        }

        slider.value = val
        slider.dispatchEvent(new Event('input'))
      })
    })

    $('font-size-slider').addEventListener('input', e => {
      novelSettings.fontSize = parseInt(e.target.value)
      $('font-size-value').textContent = novelSettings.fontSize + 'px'
      applyNovelSettings()
      saveNovelSettings()
    })

    $('line-height-slider').addEventListener('input', e => {
      novelSettings.lineHeight = parseFloat(e.target.value)
      $('line-height-value').textContent = novelSettings.lineHeight.toFixed(1)
      applyNovelSettings()
      saveNovelSettings()
    })

    $('tts-engine').addEventListener('change', e => {
      ttsEngine = e.target.value
      loadTTSVoices()
      saveTTSSettings()
      stopTTS()
    })

    $('tts-mode').addEventListener('change', e => {
      ttsMode = e.target.value
      const isDialogue = ttsMode === 'dialogue'
      $('tts-voice-section').style.display = isDialogue ? 'none' : 'block'
      $('tts-narrator-section').style.display = isDialogue ? 'block' : 'none'
      $('tts-dialogue-section').style.display = isDialogue ? 'block' : 'none'
      if (ttsPlaying) stopTTS()
      saveTTSSettings()
    })

    $('tts-voice').addEventListener('change', e => {
      ttsVoice = e.target.value
      saveTTSSettings()
    })
    $('tts-narrator-voice').addEventListener('change', e => {
      ttsNarratorVoice = e.target.value
      saveTTSSettings()
    })
    $('tts-dialogue-voice').addEventListener('change', e => {
      ttsDialogueVoice = e.target.value
      saveTTSSettings()
    })

    $('tts-rate-slider').addEventListener('input', e => {
      ttsRate = parseFloat(e.target.value)
      $('tts-rate-value').textContent = ttsRate.toFixed(1) + 'x'
      saveTTSSettings()
    })

    setupTTSFabDrag()
    if ('speechSynthesis' in window) {
      speechSynthesis.onvoiceschanged = () => {
        if (currentNovel) {
          loadTTSVoices()
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (!$('novel-reader-view').classList.contains('hidden')) {
        if (e.key === 'Escape') {
          closeNovelReader()
        } else if (e.key === 'p' || e.key === 'P') {
          if (ttsPlaying) {
            pauseTTS()
          } else {
            playTTS()
          }
        } else if (e.key === '[') {
          prevTTSSegment()
        } else if (e.key === ']') {
          nextTTSSegment()
        }
        return
      }
      if ($('reader-view').classList.contains('hidden')) return
      if (readerMode !== 'page') return
      switch (e.key) {
        case 'ArrowLeft': case 'PageUp': prevPage(); break
        case 'ArrowRight': case 'PageDown': case ' ': nextPage(); break
        case 'Escape': closeReader(); break
        case 'Home': currentPage = 1; updatePage(); break
        case 'End': currentPage = currentPages.length; updatePage(); break
      }
    })

    if (currentType === 'novel') {
      switchType('novel')
    } else {
      loadLibrary()
    }
  </script>
</body>
</html>
